<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback | PETmalu</title>
    <link rel="shortcut icon" href="../Assets/FaviconLogo.ico" type="image/x-icon">
    <link rel="stylesheet" href="index_style.css">
    <link rel="stylesheet" href="pages_style.css">
    <script src="page_script.js" defer></script>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">
            <img src="../Assets/Home_HeaderLogoSMALL.svg" alt="PETmalu">
        </a>
        <ul class="nav-links">
            <li><a href="#"></a></li>
        </ul>
        <button class="btn-login">Log In</button>
        <button class="hamburger">☰</button>
    </nav>

    <section class="page-hero">
        <div class="hero-overlay"></div>
        <div class="page-content">
            <h1>FEEDBACK</h1>
            <p>
                We appreciate your feedback! Your thoughts and suggestions help us improve PETmalu for everyone.
            </p>
        </div>
    </section>

    <div class="separator"></div>

    <section class="form-section">
        <div class="form-container">
            <div class="form-card">
                <h2>Share Your Experience</h2>
                <form>
                    <input type="text" placeholder="Full Name" required>
                    <input type="email" placeholder="Email Address" required>
                    <select required>
                        <option value="">Select Rating</option>
                        <option>AWESOME</option>
                        <option>GOOD</option>
                        <option>AVERAGE</option>
                        <option>POOR</option>
                        <option>VERY </option>
                    </select>
                    <textarea rows="6" placeholder="Write your feedback here..."></textarea>
                    <button type="submit">SUBMIT FEEDBACK</button>
                </form>
            </div>
        </div>
    </section>

    <footer>
        <div class="foot_nav">
            <ul class="foot_list">
                <li><a href="aboutus.html">About Us</a></li>
                <li><a href="feedback.html">Feedback</a></li>
                <li><a href="contact.html">Contact Us</a></li>
                <li><a href="../WebTOS/tos.html">Terms Of Service</a></li>
            </ul>
            <img src="../Assets/Home_HeaderLogoSMALL.svg" alt="PETmalu Logo" class="logo_foot">
            <p>Copyright &copy; BSCS 1-7. All rights Reserved.</p>
        </div>
    </footer>

</body>
</html>
