<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="shortcut icon" href="../Assets/FaviconLogo.ico" type="image/x-icon">
    <link rel="stylesheet" href="setting_style.css">
    <script src="setting_script.js" defer></script>
</head>
<body>

    <!-- TOP NAVBAR -->
    <nav class="profile-nav">
        <a href="../WebIndex/index.html" class="nav-logo">
            <img src="../Assets/Home_HeaderLogoSMALL.svg" alt="PETmalu">
        </a>
        <div class="nav-links">
            <a href="../WebAdventure/dailytask.html">GAME</a>
            <a href="../WebCoupons/coupons.html">COUPAWS</a>
            <button class="btn-logout" id="btnLogout">Log out</button>
        </div>
        <button class="hamburger" onclick="toggleMenu()">&#9776;</button>
    </nav>

    <div class="page-layout">

        <!-- LEFT SIDEBAR -->
        <aside class="sidebar">
            <button class="sidebar-btn active" data-section="profile">PROFILE</button>
            <button class="sidebar-btn" data-section="security">SECURITY</button>
            <button class="sidebar-btn" data-section="coupaws">COUPAWS</button>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="main-content">

            <!-- ── PROFILE SECTION ── -->
            <section class="section-panel active" id="section-profile">
                <div class="panel-left">

                    <div class="form-block">
                        <h2 class="section-title">HOOMAN PROFILE:</h2>

                        <label class="field-label">Username:</label>
                        <div class="input-wrap">
                            <input type="text" id="profileUsername" placeholder="Enter username">
                        </div>

                        <label class="field-label">Email:</label>
                        <div class="input-wrap">
                            <input type="email" id="profileEmail" placeholder="Enter email" readonly>
                        </div>
                    </div>

                    <hr class="divider">

                    <div class="form-block">
                        <h2 class="section-title">PET PROFILE:</h2>

                        <div class="input-wrap">
                            <button class="btn-upload" id="btnUploadPet">Click here to add pet photo</button>
                            <input type="file" id="petPhotoInput" accept="image/*" style="display:none;">
                        </div>

                        <label class="field-label">Pet Name:</label>
                        <div class="input-wrap">
                            <input type="text" id="petName" placeholder="Enter pet name">
                        </div>

                        <label class="field-label">Custom Title:</label>
                        <div class="input-wrap">
                            <input type="text" id="petTitle" placeholder="Enter custom title">
                        </div>
                    </div>

                </div>

                <!-- PET CARD PREVIEW -->
                <div class="panel-right">
                    <h3 class="card-preview-title">YOUR PET CARD TEMPLATE:</h3>

                    <div class="pet-card-preview pet-card">

                        <div class="card-top-layout">
                            <div class="pet-name-vertical" id="previewPetName">PET NAME</div>
                            <div class="pet-image-container">
                                <div class="pet-image-placeholder" id="petImagePlaceholder">
                                    <span>PET PICTURE<br>HERE</span>
                                </div>
                                <img id="previewPetImg" src="" alt="Pet" style="display:none;">
                            </div>
                        </div>

                        <div class="card-title-divider">
                            <span>🐾</span>
                            <span class="card-label">TITLE</span>
                            <span>🐾</span>
                        </div>

                        <div class="card-pet-title" id="previewPetTitle">YOUR PET TITLE</div>

                        <div class="card-stats-layout">
                            <div class="level-container">
                                <label>LEVEL:</label>
                                <div class="xp-bar">
                                    <div class="xp-progress" style="width: 2%;"></div>
                                </div>
                            </div>
                            <div class="stat-row">
                                <div class="stat-box">
                                    <span class="stat-label">PAW-ER:</span>
                                    <strong class="stat-value">2 PAWS</strong>
                                </div>
                                <div class="stat-box">
                                    <span class="stat-label">ENERGY:</span>
                                    <strong class="stat-value">100%</strong>
                                </div>
                            </div>
                        </div>

                    </div>

                    <button class="btn-save" id="btnSave">SAVE CHANGES</button>
                </div>

            </section>

            <!-- ── SECURITY SECTION ── -->
            <section class="section-panel" id="section-security">
                <div class="panel-left">
                    <h2 class="section-title">SECURITY:</h2>

                    <label class="field-label">Current Password:</label>
                    <div class="input-wrap">
                        <input type="password" id="currentPass" placeholder="Enter current password">
                    </div>
                    <span class="form-error" id="currentPassError"></span>

                    <label class="field-label">New Password:</label>
                    <div class="input-wrap">
                        <input type="password" id="newPass" placeholder="Enter new password">
                    </div>
                    <span class="form-error" id="newPassError"></span>

                    <label class="field-label">Confirm New Password:</label>
                    <div class="input-wrap">
                        <input type="password" id="confirmNewPass" placeholder="Confirm new password">
                    </div>
                    <span class="form-error" id="confirmPassError"></span>

                    <span class="form-error" id="securityFormError"></span>
                    <button class="btn-save solo" id="btnChangePass">CHANGE PASSWORD</button>
                </div>
            </section>

            <!-- ── COUPAWS SECTION ── -->
            <section class="section-panel" id="section-coupaws">
                <div class="panel-left">
                    <h2 class="section-title">COUPAWS:</h2>
                    <p class="placeholder-text">Your Coupaws will appear here once you start playing!</p>
                </div>
            </section>

        </main>
    </div>

</body>
</html>
